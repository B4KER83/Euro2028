<!DOCTYPE html>
<html lang="en">
<head>
<link rel="apple-touch-icon" href="IMG_0703.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>EURO 2028</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0d1117;
  font-family: 'Arial Narrow', Arial, sans-serif;
  overflow-x: hidden; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  user-select: none; -webkit-user-select: none;
}
.page-wrapper { display: flex; flex-direction: column; align-items: center; min-height: 100vh; background: #0d1117; }
.pg-head {
  background: linear-gradient(135deg,#061730,#124094,#061730);
  border-bottom: 2px solid #00f2fe;
  padding: 7px 8px 5px;
  position: sticky; top: 0; z-index: 99;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  width: 100%;
}
.pg-head-text h1 { color: #00f2fe; font-size: 13px; font-weight: 900; letter-spacing: 2px; }
.pg-head-text p  { color: #7a9acc; font-size: 7.5px; letter-spacing: 1px; margin-top: 1px; }
.btn-group { display: flex; gap: 6px; flex-shrink: 0; }
.hbtn { border: none; border-radius: 7px; font-size: 11px; font-weight: 900; padding: 7px 11px; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.hbtn:active { opacity: .7; }
.btn-auto   { background: #00f2fe; color: #000; }
.btn-manual { background: #21262d; color: #00f2fe; border: 1px solid #00f2fe !important; }
.sec {
  background: #161b22; color: #00f2fe;
  font-size: 8.5px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; padding: 5px 4px;
  border-top: 1px solid #21262d; border-bottom: 1px solid #21262d;
  display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
}
.sec::before,.sec::after { content:''; flex:1; height:1px; background:linear-gradient(to right,transparent,#00f2fe44); }
.sec::after { background:linear-gradient(to left,transparent,#00f2fe44); }
.legend {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  padding: 4px 6px; background: #0d1117;
  font-size: 7.5px; color: #6e7681; border-bottom: 1px solid #21262d; width: 100%;
}
.legend span { display: flex; align-items: center; gap: 3px; }
.ldot { width: 8px; height: 8px; border-radius: 2px; }
.content-section { width: 100%; max-width: 1600px; padding: 0; background: #0d1117; }
.grp-band {
  display: flex; gap: 5px; padding: 6px 5px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: #0d1117; scrollbar-width: none; width: 100%;
}
.grp-band::-webkit-scrollbar { display: none; }
.grp { flex:0 0 auto; width:152px; border-radius:8px; overflow:hidden; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.4); }
.grp-hdr { color:#fff; font-weight:900; font-size:10.5px; padding:4px 7px; display:flex; justify-content:space-between; align-items:center; }
.grp-tbl { width:100%; border-collapse:collapse; }
.grp-tbl th { background:#e8e8e8; font-size:7.5px; padding:2px; text-align:center; color:#555; }
.grp-tbl td { padding:2px; border-bottom:1px solid #eee; vertical-align:middle; }
.grp-tbl tr:last-child td { border-bottom:none; }
.tn { display:flex; align-items:center; gap:2px; font-weight:700; white-space:nowrap; font-size:8.5px; }
.fl { font-size:11px; line-height:1; }
.pts-c { font-weight:900; text-align:center; font-size:9px; }
.num-c { text-align:center; color:#777; font-size:8px; }
.q1{background:#c6f6d5!important} .q2{background:#bee3f8!important} .q3{background:#fefcbf!important}
.mrow { display:grid; grid-template-columns:28px 1fr 14px 1fr; align-items:center; padding:1.5px 4px; border-bottom:1px solid #f0f0f0; background:#f9f9f9; gap:1px; }
.mrow:last-child{border-bottom:none}
.mrow .md  { color:#bbb; font-size:6.5px; white-space:nowrap; }
.mrow .mt1 { font-weight:600; font-size:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mrow .mt2 { text-align:right; font-weight:600; font-size:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mscore { background:#1a1a2e; color:#fff; padding:0 2px; border-radius:2px; font-weight:900; font-size:6.5px; text-align:center; }
.ko-section { background:#0d1117; padding:0 5px 6px; width:100%; display:flex; flex-direction:column; align-items:center; }
.round-label { text-align:center; color:#00f2fe; font-size:8px; font-weight:900; letter-spacing:2px; text-transform:uppercase; padding:5px 0 3px; }
.ko-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; display:flex; justify-content:center; width:100%; }
.ko-scroll::-webkit-scrollbar{display:none}
.ko-row { display:flex; gap:5px; min-width:max-content; padding:0 1px; }
.mc { width:132px; flex-shrink:0; border:1.5px solid #21262d; border-radius:7px; overflow:hidden; background:#161b22; }
.mc .tr { display:flex; align-items:center; padding:4px 6px; border-bottom:1px solid #21262d; font-size:8px; font-weight:700; color:#e6edf3; white-space:nowrap; overflow:hidden; }
.mc .tr:last-of-type{border-bottom:none}
.mc .tr .sc { margin-left:auto; background:#21262d; color:#8b949e; padding:1px 4px; border-radius:4px; font-size:8px; min-width:16px; text-align:center; flex-shrink:0; font-weight:900; }
.mc .bi { background:#0d1117; font-size:7px; color:#6e7681; padding:2px 5px; text-align:center; }
.mc-final { width:160px; flex-shrink:0; border:2.5px solid #00f2fe; border-radius:9px; overflow:hidden; background:#0d1117; box-shadow:0 3px 12px rgba(0,242,254,.25); }
.mc-final .fh { background:linear-gradient(135deg,#0052d4,#4364f7,#6fb1fc); color:#fff; text-align:center; font-weight:900; font-size:11px; padding:5px; letter-spacing:2px; }
.mc-final .tr { display:flex; align-items:center; padding:5px 8px; border-bottom:1px solid #21262d; font-size:9.5px; font-weight:900; color:#e6edf3; }
.mc-final .tr:last-of-type{border-bottom:none}
.mc-final .tr .sc { margin-left:auto; background:#21262d; color:#6e7681; padding:2px 6px; border-radius:4px; font-size:9px; min-width:18px; text-align:center; }
.mc-final .bi { background:#161b22; font-size:7.5px; color:#8b949e; padding:3px 6px; text-align:center; }
.finals-row { display:flex; gap:8px; justify-content:center; align-items:flex-start; padding:2px 4px; flex-wrap:wrap; }
.pg-foot { background:#051124; color:#00f2fe; text-align:center; font-size:10px; font-weight:900; padding:8px; letter-spacing:2px; border-top:2px solid #00f2fe; margin-top:4px; width:100%; }

@media (min-width: 768px) {
  .page-wrapper { padding: 0 20px; }
  .pg-head { margin: 0 -20px; padding-left: 28px; padding-right: 28px; }
  .legend { margin: 0 -20px; padding: 8px 12px; width: calc(100% + 40px); }
  .sec { margin: 0 -20px; width: calc(100% + 40px); font-size: 12px; padding: 8px; }
  .content-section { max-width: 1400px; padding: 0; }
  .pg-head-text h1 { font-size: 20px; letter-spacing: 3px; }
  .pg-head-text p  { font-size: 11px; }
  .hbtn { font-size: 14px; padding: 9px 18px; }
  .ldot { width: 12px; height: 12px; }
  .grp-band { gap: 8px; padding: 0 12px; justify-content: center; }
  .grp { width: 220px; border-radius: 8px; }
  .grp-hdr { font-size: 14px; padding: 6px 10px; }
  .grp-tbl th { font-size: 11px; padding: 3px 4px; }
  .grp-tbl td { padding: 3px 4px; }
  .tn { font-size: 12px; gap: 4px; }
  .fl { font-size: 15px; }
  .pts-c { font-size: 13px; }
  .num-c { font-size: 11px; }
  .mrow { grid-template-columns: 40px 1fr 18px 1fr; padding: 3px 6px; }
  .mrow .md  { font-size: 10px; }
  .mrow .mt1, .mrow .mt2 { font-size: 11px; }
  .mscore { font-size: 11px; padding: 1px 5px; border-radius: 4px; }
  .ko-section { padding: 0 12px 10px; }
  .round-label { font-size: 12px; padding: 8px 0 5px; letter-spacing: 3px; }
  .ko-row { gap: 8px; }
  .mc { width: 190px; border-radius: 9px; }
  .mc .tr { font-size: 11.5px; padding: 5px 8px; }
  .mc .tr .sc { font-size: 11px; min-width: 22px; padding: 2px 6px; }
  .mc .bi { font-size: 10px; padding: 3px 8px; }
  .mc-final { width: 240px; border-radius: 12px; }
  .mc-final .fh { font-size: 16px; padding: 8px; letter-spacing: 3px; }
  .mc-final .tr { font-size: 13px; padding: 7px 12px; }
  .mc-final .tr .sc { font-size: 12px; min-width: 26px; padding: 3px 8px; }
  .mc-final .bi { font-size: 11px; padding: 4px 10px; }
  .pg-foot { font-size: 14px; padding: 12px; letter-spacing: 3px; }
}
@media (min-width: 1200px) {
  .content-section { max-width: 1600px; }
  .grp { width: 260px; }
  .mc { width: 210px; }
  .mc-final { width: 260px; }
}
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="pg-head">
    <div class="pg-head-text">
      <h1>⚽ UEFA EURO 2028™</h1>
      <p>UK &amp; IRELAND &nbsp;|&nbsp; 09 JUN &ndash; 09 JUL 2028 &nbsp;|&nbsp; 9 VENUES &nbsp;|&nbsp; 4 NATIONS</p>
    </div>
    <div class="btn-group">
      <button class="hbtn btn-auto" id="auto-btn" onclick="fetchLiveScores()">⚡ Auto</button>
      <button class="hbtn btn-manual" onclick="alert('Manual update placeholder')">📝 Manual</button>
    </div>
  </div>

  <div class="legend">
    <span><div class="ldot" style="background:#c6f6d5;border:1px solid #68d391"></div>1st</span>
    <span><div class="ldot" style="background:#bee3f8;border:1px solid #63b3ed"></div>2nd</span>
    <span><div class="ldot" style="background:#fefcbf;border:1px solid #f6e05e"></div>3rd (best 4)</span>
  </div>

  <div class="sec">GROUPS A &ndash; C</div>
  <div class="content-section"><div class="grp-band" id="top-groups"></div></div>
  <div class="sec">KNOCKOUT BRACKET</div>
  <div class="ko-section" id="ko"></div>
  <div class="sec">GROUPS D &ndash; F</div>
  <div class="content-section"><div class="grp-band" id="bot-groups"></div></div>
  <div class="pg-foot">UEFA EURO 2028™ &nbsp;&middot;&nbsp; UK &amp; IRELAND &nbsp;&middot;&nbsp; QUALIFYING DRAW: 6 DEC 2026, BELFAST</div>
</div>

<script>
var GROUPS = [
  {
    id:'A', hc:'linear-gradient(135deg,#1e3a8a,#3b82f6)',
    teams:['A1 (Wales*)','A2','A3','A4'],
    matches:[
      {n:'M1',  t1:'A1',t2:'A2', date:'9 Jun'},
      {n:'M2',  t1:'A3',t2:'A4', date:'10 Jun'},
      {n:'M13', t1:'A1',t2:'A3', date:'14 Jun'},
      {n:'M14', t1:'A2',t2:'A4', date:'14 Jun'},
      {n:'M25', t1:'A4',t2:'A1', date:'18 Jun'},
      {n:'M26', t1:'A2',t2:'A3', date:'18 Jun'}
    ]
  },
  {
    id:'B', hc:'linear-gradient(135deg,#b91c1c,#ef4444)',
    teams:['B1 (England*)','B2','B3','B4'],
    matches:[
      {n:'M3',  t1:'B1',t2:'B2', date:'10 Jun'},
      {n:'M4',  t1:'B3',t2:'B4', date:'10 Jun'},
      {n:'M15', t1:'B1',t2:'B3', date:'14 Jun'},
      {n:'M18', t1:'B2',t2:'B4', date:'15 Jun'},
      {n:'M27', t1:'B4',t2:'B1', date:'19 Jun'},
      {n:'M28', t1:'B2',t2:'B3', date:'19 Jun'}
    ]
  },
  {
    id:'C', hc:'linear-gradient(135deg,#15803d,#22c55e)',
    teams:['C1','C2','C3','C4'],
    matches:[
      {n:'M5',  t1:'C1',t2:'C2', date:'11 Jun'},
      {n:'M6',  t1:'C3',t2:'C4', date:'11 Jun'},
      {n:'M16', t1:'C1',t2:'C3', date:'15 Jun'},
      {n:'M17', t1:'C2',t2:'C4', date:'15 Jun'},
      {n:'M29', t1:'C4',t2:'C1', date:'20 Jun'},
      {n:'M30', t1:'C2',t2:'C3', date:'20 Jun'}
    ]
  },
  {
    id:'D', hc:'linear-gradient(135deg,#6d28d9,#8b5cf6)',
    teams:['D1 (N.Ire*)','D2','D3','D4'],
    matches:[
      {n:'M7',  t1:'D3',t2:'D4', date:'11 Jun'},
      {n:'M8',  t1:'D1',t2:'D2', date:'12 Jun'},
      {n:'M19', t1:'D1',t2:'D3', date:'16 Jun'},
      {n:'M20', t1:'D2',t2:'D4', date:'16 Jun'},
      {n:'M31', t1:'D4',t2:'D1', date:'20 Jun'},
      {n:'M32', t1:'D2',t2:'D3', date:'20 Jun'}
    ]
  },
  {
    id:'E', hc:'linear-gradient(135deg,#b45309,#f59e0b)',
    teams:['E1 (Ireland*)','E2','E3','E4'],
    matches:[
      {n:'M9',  t1:'E1',t2:'E2', date:'12 Jun'},
      {n:'M10', t1:'E3',t2:'E4', date:'12 Jun'},
      {n:'M21', t1:'E1',t2:'E3', date:'16 Jun'},
      {n:'M24', t1:'E2',t2:'E4', date:'17 Jun'},
      {n:'M33', t1:'E4',t2:'E1', date:'21 Jun'},
      {n:'M34', t1:'E2',t2:'E3', date:'21 Jun'}
    ]
  },
  {
    id:'F', hc:'linear-gradient(135deg,#0f766e,#14b8a6)',
    teams:['F1 (Scotland*)','F2','F3','F4'],
    matches:[
      {n:'M11', t1:'F1',t2:'F2', date:'13 Jun'},
      {n:'M12', t1:'F3',t2:'F4', date:'13 Jun'},
      {n:'M22', t1:'F1',t2:'F3', date:'17 Jun'},
      {n:'M23', t1:'F2',t2:'F4', date:'17 Jun'},
      {n:'M35', t1:'F4',t2:'F1', date:'21 Jun'},
      {n:'M36', t1:'F2',t2:'F3', date:'21 Jun'}
    ]
  }
];

var KO = {
  r16: [
    {t1:'Winner A',    t2:'Runner-up C',  s1:null,s2:null, info:'M37 · 24 Jun · Cardiff'},
    {t1:'Runner-up A', t2:'Runner-up B',  s1:null,s2:null, info:'M38 · 24 Jun · Liverpool'},
    {t1:'Winner B',    t2:'3rd A/D/E/F',  s1:null,s2:null, info:'M39 · 25 Jun · Newcastle'},
    {t1:'Winner C',    t2:'3rd D/E/F',    s1:null,s2:null, info:'M40 · 25 Jun · Manchester'},
    {t1:'Winner F',    t2:'3rd A/B/C',    s1:null,s2:null, info:'M41 · 26 Jun · Glasgow'},
    {t1:'Runner-up D', t2:'Runner-up E',  s1:null,s2:null, info:'M42 · 26 Jun · Tottenham'},
    {t1:'Winner E',    t2:'3rd A/B/C/D',  s1:null,s2:null, info:'M43 · 27 Jun · Dublin'},
    {t1:'Winner D',    t2:'Runner-up F',  s1:null,s2:null, info:'M44 · 27 Jun · Birmingham'}
  ],
  qf: [
    {t1:'Winner M39', t2:'Winner M37', s1:null,s2:null, info:'M45 · 30 Jun · Wembley'},
    {t1:'Winner M41', t2:'Winner M42', s1:null,s2:null, info:'M46 · 30 Jun · Dublin'},
    {t1:'Winner M44', t2:'Winner M43', s1:null,s2:null, info:'M47 · 1 Jul · Glasgow'},
    {t1:'Winner M40', t2:'Winner M38', s1:null,s2:null, info:'M48 · 1 Jul · Cardiff'}
  ],
  sf: [
    {t1:'Winner M45', t2:'Winner M46', s1:null,s2:null, info:'M49 · 4 Jul · Wembley'},
    {t1:'Winner M47', t2:'Winner M48', s1:null,s2:null, info:'M50 · 5 Jul · Wembley'}
  ],
  final: {t1:'Winner M49', t2:'Winner M50', s1:null,s2:null, info:'M51 · 9 Jul 2028 · Wembley Stadium, London'}
};

function renderAll() {
  var topG = document.getElementById('top-groups');
  var botG = document.getElementById('bot-groups');
  topG.innerHTML = ''; botG.innerHTML = '';

  GROUPS.forEach(function(g, idx) {
    var html = '<div class="grp">';
    html += '<div class="grp-hdr" style="background:'+g.hc+'">Group '+g.id+'</div>';
    html += '<table class="grp-tbl"><tr><th>TEAM</th><th>GD</th><th>PTS</th></tr>';
    g.teams.forEach(function(team, rk) {
      var cls = rk===0?'q1':rk===1?'q2':rk===2?'q3':'';
      html += '<tr class="'+cls+'"><td><div class="tn">🏳️ '+team+'</div></td><td class="num-c">0</td><td class="pts-c">0</td></tr>';
    });
    html += '</table>';
    g.matches.forEach(function(m) {
      html += '<div class="mrow">' +
        '<span class="md">'+m.date+'</span>' +
        '<span class="mt1">'+m.t1+'</span>' +
        '<span class="mscore">v</span>' +
        '<span class="mt2">'+m.t2+'</span>' +
        '</div>';
    });
    html += '</div>';
    if (idx < 3) topG.innerHTML += html; else botG.innerHTML += html;
  });

  var ko = document.getElementById('ko');
  ko.innerHTML = '';
  [{key:'r16',label:'Round of 16'},{key:'qf',label:'Quarter-Finals'},{key:'sf',label:'Semi-Finals'}].forEach(function(r) {
    var h = '<div class="round-label">'+r.label+'</div><div class="ko-scroll"><div class="ko-row">';
    KO[r.key].forEach(function(m) {
      h += '<div class="mc">' +
        '<div class="tr"><span>🔹 '+m.t1+'</span><span class="sc">'+(m.s1!==null?m.s1:'-')+'</span></div>' +
        '<div class="tr"><span>🔹 '+m.t2+'</span><span class="sc">'+(m.s2!==null?m.s2:'-')+'</span></div>' +
        '<div class="bi">'+m.info+'</div></div>';
    });
    h += '</div></div>';
    ko.innerHTML += h;
  });

  ko.innerHTML += '<div class="round-label">Final</div><div class="finals-row"><div class="mc-final">' +
    '<div class="fh">EURO 2028 FINAL</div>' +
    '<div class="tr"><span>🏆 '+KO.final.t1+'</span><span class="sc">-</span></div>' +
    '<div class="tr"><span>🏆 '+KO.final.t2+'</span><span class="sc">-</span></div>' +
    '<div class="bi">'+KO.final.info+'</div></div></div>';
}

// ── STORAGE ──────────────────────────────────────────────────────────────────
var STORAGE_KEY = 'euro2028_scores';

function saveScores() {
  var data = { groups: {}, ko: { r16:[], qf:[], sf:[], final:{} } };
  GROUPS.forEach(function(g) {
    data.groups[g.id] = g.matches.map(function(m){ return {s1:m.s1||null,s2:m.s2||null}; });
  });
  ['r16','qf','sf'].forEach(function(r){
    data.ko[r] = KO[r].map(function(m){ return {s1:m.s1,s2:m.s2}; });
  });
  data.ko.final = {s1:KO.final.s1, s2:KO.final.s2};
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

function loadScores() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.groups) {
      GROUPS.forEach(function(g) {
        if (data.groups[g.id]) {
          data.groups[g.id].forEach(function(s,i){
            if (g.matches[i]) { g.matches[i].s1 = s.s1; g.matches[i].s2 = s.s2; }
          });
        }
      });
    }
    if (data.ko) {
      ['r16','qf','sf'].forEach(function(r){
        if (data.ko[r]) data.ko[r].forEach(function(s,i){ if(KO[r][i]){KO[r][i].s1=s.s1;KO[r][i].s2=s.s2;} });
      });
      if (data.ko.final) { KO.final.s1=data.ko.final.s1; KO.final.s2=data.ko.final.s2; }
    }
  } catch(e){}
}

// ── MANUAL MODAL ─────────────────────────────────────────────────────────────
var ALL_MATCHES = [];

function buildMatchList() {
  ALL_MATCHES = [];
  GROUPS.forEach(function(g) {
    g.matches.forEach(function(m) {
      ALL_MATCHES.push({ label: m.n+' ('+m.date+') '+m.t1+' v '+m.t2, ref: m, type:'group' });
    });
  });
  ['r16','qf','sf'].forEach(function(r) {
    KO[r].forEach(function(m,i) {
      ALL_MATCHES.push({ label: m.info.split('·')[0].trim()+' '+m.t1+' v '+m.t2, ref: m, type:'ko' });
    });
  });
  ALL_MATCHES.push({ label: 'Final: '+KO.final.t1+' v '+KO.final.t2, ref: KO.final, type:'ko' });
}

function openManual() {
  buildMatchList();
  var modal = document.getElementById('manual-modal');
  var sel = document.getElementById('modal-match-select');
  sel.innerHTML = '';
  ALL_MATCHES.forEach(function(m, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.label;
    sel.appendChild(opt);
  });
  onModalMatchChange();
  modal.style.display = 'flex';
}

function closeManual() {
  document.getElementById('manual-modal').style.display = 'none';
}

function onModalMatchChange() {
  var idx = parseInt(document.getElementById('modal-match-select').value);
  var m = ALL_MATCHES[idx].ref;
  document.getElementById('modal-s1').value = m.s1 !== null ? m.s1 : '';
  document.getElementById('modal-s2').value = m.s2 !== null ? m.s2 : '';
}

function saveManual() {
  var idx = parseInt(document.getElementById('modal-match-select').value);
  var m = ALL_MATCHES[idx].ref;
  var v1 = document.getElementById('modal-s1').value.trim();
  var v2 = document.getElementById('modal-s2').value.trim();
  m.s1 = v1 === '' ? null : parseInt(v1);
  m.s2 = v2 === '' ? null : parseInt(v2);
  saveScores();
  renderAll();
  closeManual();
}

function clearManual() {
  var idx = parseInt(document.getElementById('modal-match-select').value);
  var m = ALL_MATCHES[idx].ref;
  m.s1 = null; m.s2 = null;
  document.getElementById('modal-s1').value = '';
  document.getElementById('modal-s2').value = '';
  saveScores();
  renderAll();
}

// ── AUTO ──────────────────────────────────────────────────────────────────────
function fetchLiveScores() {
  var btn = document.getElementById('auto-btn');
  btn.innerText = '⌛...';
  // Wire up to WORKER_URL when live data available for Euro 2028
  setTimeout(function(){ btn.innerText = '⚡ Auto'; }, 1500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadScores();
renderAll();
</script>

<!-- MANUAL MODAL -->
<div id="manual-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center;padding:12px;">
  <div style="background:#161b22;border:2px solid #00f2fe;border-radius:12px;padding:16px;width:100%;max-width:360px;color:#e6edf3;font-family:'Arial Narrow',Arial,sans-serif;">
    <div style="color:#00f2fe;font-weight:900;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">📝 Enter Score</div>
    <select id="modal-match-select" onchange="onModalMatchChange()" style="width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 8px;font-size:11px;margin-bottom:12px;"></select>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      <input id="modal-s1" type="number" min="0" max="20" placeholder="–" style="flex:1;background:#0d1117;color:#00f2fe;border:1px solid #30363d;border-radius:6px;padding:8px;font-size:20px;font-weight:900;text-align:center;width:0;">
      <span style="color:#6e7681;font-weight:900;font-size:16px;">–</span>
      <input id="modal-s2" type="number" min="0" max="20" placeholder="–" style="flex:1;background:#0d1117;color:#00f2fe;border:1px solid #30363d;border-radius:6px;padding:8px;font-size:20px;font-weight:900;text-align:center;width:0;">
    </div>
    <div style="display:flex;gap:8px;">
      <button onclick="saveManual()" style="flex:1;background:#00f2fe;color:#000;border:none;border-radius:7px;padding:9px;font-weight:900;font-size:13px;cursor:pointer;">✔ Save</button>
      <button onclick="clearManual()" style="background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:7px;padding:9px;font-weight:900;font-size:13px;cursor:pointer;">✕ Clear</button>
      <button onclick="closeManual()" style="background:#21262d;color:#6e7681;border:1px solid #30363d;border-radius:7px;padding:9px;font-weight:900;font-size:13px;cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>
</body>
</html>
