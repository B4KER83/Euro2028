<!DOCTYPE html>
<html lang="en">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #0d1117;
  font-family: 'Arial Narrow', Arial, sans-serif;
  overflow-x: hidden; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  user-select: none; -webkit-user-select: none;
}
.page-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
.pg-head {
  background: linear-gradient(135deg,#061730,#124094,#061730);
  border-bottom: 2px solid #00f2fe;
  padding: 7px 8px 5px;
  position: sticky; top: 0; z-index: 99;
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  width: 100%;
}
.pg-head-text h1 { color: #00f2fe; font-size: 13px; font-weight: 900; letter-spacing: 2px; }
.pg-head-text p  { color: #7a9acc; font-size: 7.5px; letter-spacing: 1px; margin-top: 1px; }
.btn-group { display: flex; gap: 6px; flex-shrink: 0; }
.hbtn {
  border: none; border-radius: 7px;
  font-size: 11px; font-weight: 900; padding: 7px 11px; cursor: pointer;
  white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.hbtn:active { opacity: .7; }
.btn-auto   { background: #00f2fe; color: #000; }
.btn-manual { background: #21262d; color: #00f2fe; border: 1px solid #00f2fe !important; }

.sec {
  background: #161b22; color: #00f2fe;
  font-size: 8.5px; font-weight: 900; letter-spacing: 2px;
  text-transform: uppercase; text-align: center; padding: 5px 4px;
  border-top: 1px solid #21262d; border-bottom: 1px solid #21262d;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
}
.sec::before,.sec::after { content:''; flex:1; height:1px; background:linear-gradient(to right,transparent,#00f2fe44); }
.sec::after { background:linear-gradient(to left,transparent,#00f2fe44); }

.legend {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  padding: 4px 6px; background: #0d1117;
  font-size: 7.5px; color: #6e7681; border-bottom: 1px solid #21262d;
  width: 100%;
}
.legend span { display: flex; align-items: center; gap: 3px; }
.ldot { width: 8px; height: 8px; border-radius: 2px; }

.content-section { width: 100%; max-width: 1600px; padding: 0 8px; }

.grp-band {
  display: flex; gap: 5px; padding: 6px 5px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: #0d1117; scrollbar-width: none;
  justify-content: center; width: 100%;
}
.grp-band::-webkit-scrollbar { display: none; }

.grp { flex:0 0 auto; width:152px; border-radius:8px; overflow:hidden; background:#fff; box-shadow:0 2px 8px rgba(0,0,0,.4); }
.grp-hdr { color:#fff; font-weight:900; font-size:10.5px; padding:4px 7px; display:flex; justify-content:space-between; align-items:center; }
.grp-hdr small { font-weight:400; font-size:8px; opacity:.75; }
.grp-tbl { width:100%; border-collapse:collapse; }
.grp-tbl th { background:#e8e8e8; font-size:7.5px; padding:2px; text-align:center; color:#555; }
.grp-tbl td { padding:2px; border-bottom:1px solid #eee; vertical-align:middle; }
.grp-tbl tr:last-child td { border-bottom:none; }
.tn { display:flex; align-items:center; gap:2px; font-weight:700; white-space:nowrap; font-size:8.5px; }
.fl { font-size:11px; line-height:1; }
.pts-c { font-weight:900; text-align:center; font-size:9px; }
.num-c { text-align:center; color:#777; font-size:8px; }
.q1{background:#c6f6d5!important} .q2{background:#bee3f8!important} .q3{background:#fefcbf!important}
.q1.confirmed{background:#22c55e!important;color:#fff;font-weight:900}
.q2.confirmed{background:#3b82f6!important;color:#fff;font-weight:900}
.eliminated{background:#fee2e2!important;color:#991b1b;opacity:.7}
.mrow { display:flex; align-items:center; padding:1.5px 4px; border-bottom:1px solid #f0f0f0; background:#f9f9f9; }
.mrow:last-child{border-bottom:none}
.mrow .md  { color:#bbb; font-size:7px; min-width:26px; flex-shrink:0; }
.mrow .mt1 { flex:1; font-weight:600; font-size:7.5px; white-space:nowrap; overflow:hidden; }
.mrow .mt2 { flex:1; text-align:right; font-weight:600; font-size:7.5px; white-space:nowrap; overflow:hidden; }
.mscore { background:#1a1a2e; color:#fff; padding:0 3px; border-radius:3px; font-weight:900; font-size:8px; margin:0 2px; flex-shrink:0; }
.mscore.tbd { background:#ccc; color:#888; }

.ko-section { background:#0d1117; padding:0 5px 6px; width:100%; display:flex; flex-direction:column; align-items:center; }
.round-label { text-align:center; color:#00f2fe; font-size:8px; font-weight:900; letter-spacing:2px; text-transform:uppercase; padding:5px 0 3px; }
.ko-scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; display:flex; justify-content:center; width:100%; }
.ko-scroll::-webkit-scrollbar{display:none}
.ko-row { display:flex; gap:5px; min-width:max-content; padding:0 1px; }

.mc { width:122px; flex-shrink:0; border:1.5px solid #21262d; border-radius:7px; overflow:hidden; background:#161b22; }
.mc.projected { border-color:#00f2fe55; }
.mc .tr { display:flex; align-items:center; padding:3.5px 6px; border-bottom:1px solid #21262d; font-size:8.5px; font-weight:700; color:#e6edf3; white-space:nowrap; overflow:hidden; }
.mc .tr:last-of-type{border-bottom:none}
.mc .tr .mf { margin-right:3px; font-size:10px; }
.mc .tr .sc { margin-left:auto; background:#21262d; color:#8b949e; padding:1px 5px; border-radius:4px; font-size:8px; min-width:18px; text-align:center; flex-shrink:0; font-weight:900; }
.mc .tr .sc.done { background:#1f6feb; color:#fff; }
.mc .bi { background:#0d1117; font-size:7px; color:#6e7681; padding:2px 5px; text-align:center; }
.mc .proj-tag { background:#00f2fe22; color:#00f2fe; font-size:6.5px; text-align:center; padding:1px 4px; font-weight:700; }
.tbd-t { color:#6e7681!important; font-style:italic; }

.mc-final { width:148px; flex-shrink:0; border:2.5px solid #00f2fe; border-radius:9px; overflow:hidden; background:#0d1117; box-shadow:0 3px 12px rgba(0,242,254,.25); }
.mc-final .fh { background:linear-gradient(135deg,#0052d4,#4364f7,#6fb1fc); color:#fff; text-align:center; font-weight:900; font-size:13px; padding:5px; letter-spacing:3px; }
.mc-final .tr { display:flex; align-items:center; padding:5px 8px; border-bottom:1px solid #21262d; font-size:10px; font-weight:900; color:#e6edf3; }
.mc-final .tr:last-of-type{border-bottom:none}
.mc-final .tr .sc { margin-left:auto; background:#21262d; color:#6e7681; padding:2px 6px; border-radius:4px; font-size:9px; min-width:20px; text-align:center; }
.mc-final .bi { background:#161b22; font-size:7.5px; color:#8b949e; padding:3px 6px; text-align:center; }

.finals-row { display:flex; gap:8px; justify-content:center; align-items:flex-start; padding:2px 4px; flex-wrap:wrap; }
.pg-foot { background:#051124; color:#00f2fe; text-align:center; font-size:10px; font-weight:900; padding:8px; letter-spacing:2px; border-top:2px solid #00f2fe; margin-top:4px; width:100%; }

/* DESKTOP RESPONSIVENESS */
@media (min-width: 768px) {
  .page-wrapper { padding: 0 20px; }

  .legend { margin: 0 -20px; padding: 8px 12px; width: calc(100% + 40px); }

  .content-section { max-width: 1400px; padding: 0; }

  .grp-tbl td { padding: 3px 4px; }

  .pts-c { font-size: 13px; }
  .num-c { font-size: 11px; }
  .mrow { padding: 3px 6px; }
  .mrow .md  { font-size: 10px; min-width: 36px; }
  .mrow .mt1, .mrow .mt2 { font-size: 11px; }
  .mscore { font-size: 11px; padding: 1px 5px; border-radius: 4px; }
  .ko-section { padding: 0 12px 10px; }
  .round-label { font-size: 12px; padding: 8px 0 5px; letter-spacing: 3px; }
  .ko-row { gap: 8px; }
  .mc { width: 170px; border-radius: 9px; }
  .mc .tr { font-size: 12px; padding: 5px 8px; }
  .mc .tr .mf { font-size: 14px; margin-right: 4px; }
  .mc .tr .sc { font-size: 11px; min-width: 22px; padding: 2px 6px; }
  .mc .bi { font-size: 10px; padding: 3px 8px; }
  .mc .proj-tag { font-size: 9px; padding: 2px 6px; }
  .mc-final { width: 210px; border-radius: 12px; }
  .mc-final .fh { font-size: 18px; padding: 8px; letter-spacing: 4px; }
  .mc-final .tr { font-size: 14px; padding: 7px 12px; }
  .mc-final .tr .sc { font-size: 13px; min-width: 26px; padding: 3px 8px; }
  .mc-final .bi { font-size: 11px; padding: 4px 10px; }
  .pg-foot { font-size: 14px; padding: 12px; letter-spacing: 3px; }
}
@media (min-width: 1200px) {
  .content-section { max-width: 1600px; }
  .grp { width: 260px; }
  .mc { width: 195px; }
  .mc-final { width: 240px; }
}

/* MODAL */
.overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.88); overflow-y:auto; -webkit-overflow-scrolling:touch; }
.overlay.open { display:block; }
.modal { background:#161b22; border:2px solid #00f2fe; border-radius:14px; margin:12px auto 24px; max-width:420px; width:94%; overflow:hidden; }
.modal-hdr { background:linear-gradient(135deg,#0052d4,#4364f7); color:#fff; padding:11px 14px; display:flex; align-items:center; justify-content:space-between; }

.modal-note { background:#21262d; color:#8b949e; font-size:9px; padding:6px 14px; text-align:center; border-bottom:1px solid #30363d; }
.modal-body { max-height:400px; overflow-y:auto; }
.modal-match { display:flex; align-items:center; gap:5px; padding:6px 14px; border-bottom:1px solid #21262d; background:#161b22; }
.tm { flex:1; color:#e6edf3; font-weight:700; font-size:10px; white-space:nowrap; overflow:hidden; }
.tm.r { text-align:right; }
.sinp { width:34px; background:#21262d; border:1.5px solid #30363d; color:#e6edf3; font-size:14px; font-weight:900; text-align:center; border-radius:6px; padding:3px 2px; }
.sdash { color:#6e7681; font-weight:900; font-size:13px; flex-shrink:0; }
.modal-footer { padding:14px; }
.save-btn { width:100%; background:linear-gradient(135deg,#0052d4,#4364f7); border:none; border-radius:10px; color:#fff; font-size:14px; font-weight:900; padding:12px; cursor:pointer; }
</style>

function getWinner(m) {
  if (!m || m.s1===null || m.s2===null || !m.t1 || !m.t2) return null;
  return m.s1 > m.s2 ? m.t1 : (m.s2 > m.s1 ? m.t2 : m.t1); 
}

function calcStandings(g) {
  var s={};
  g.teams.forEach(function(t){s[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0};});
  g.matches.forEach(function(m){
    if(m.s1===null)return;
    var a=s[m.t1],b=s[m.t2];
    a.p++;b.p++;a.gf+=m.s1;a.ga+=m.s2;a.gd=a.gf-a.ga;
    b.gf+=m.s2;b.ga+=m.s1;b.gd=b.gf-b.ga;
    if(m.s1>m.s2){a.w++;a.pts+=3;b.l++;}
    else if(m.s1<m.s2){b.w++;b.pts+=3;a.l++;}
    else{a.d++;a.pts++;b.d++;b.pts++;}
  });
  return Object.keys(s).map(function(n){return Object.assign({name:n},s[n]);})
    .sort(function(x,y){return(y.pts-x.pts)||(y.gd-x.gd)||(y.gf-x.gf);});
}

function propagateBracket() {
  var standings = {};

  // High-level automated mappings for Euro 2028 configurations 
  KO.r16[0].t1 = standings['A'][0]?.name || '1A';
  KO.r16[0].t2 = standings['C'][1]?.name || '2C';
  
  KO.r16[1].t1 = standings['B'][0]?.name || '1B';
  KO.r16[1].t2 = standings['D'][1]?.name || '2D';

  KO.r16[2].t1 = standings['C'][0]?.name || '1C';
  KO.r16[2].t2 = standings['F'][1]?.name || '2F';

  KO.r16[3].t1 = standings['A'][1]?.name || '2A';
  KO.r16[3].t2 = standings['B'][1]?.name || '2B';

  // Cascading updates down the chain
  for (var i=0; i<4; i++) {
    var wa=getWinner(KO.r16[i*2]), wb=getWinner(KO.r16[i*2+1]);
    if (wa) KO.qf[i].t1=wa;
    if (wb) KO.qf[i].t2=wb;
  }
  for (var i=0; i<2; i++) {
    var wa=getWinner(KO.qf[i*2]), wb=getWinner(KO.qf[i*2+1]);
    if (wa) KO.sf[i].t1=wa;
    if (wb) KO.sf[i].t2=wb;
  }
  var sf1w=getWinner(KO.sf[0]), sf2w=getWinner(KO.sf[1]);
  if (sf1w) KO.final.t1=sf1w;
  if (sf2w) KO.final.t2=sf2w;
}

function renderAll() {
  var topG = document.getElementById('top-groups');
  var botG = document.getElementById('bot-groups');
  topG.innerHTML = ''; botG.innerHTML = '';

  GROUPS.forEach(function(g, idx) {
    var st = calcStandings(g);
    var html = '<div class="grp"><div class="grp-hdr" style="background:'+g.hc+'">'+g.id+'</div>';
    html += '<table class="grp-tbl"><tr><th>TEAM</th><th>GD</th><th>PTS</th></tr>';
    st.forEach(function(team, rk) {
      var cls = rk === 0 ? 'q1' : (rk === 1 ? 'q2' : (rk === 2 ? 'q3' : ''));
      html += '<tr class="'+cls+'"><td class="tn"><span class="fl">'+fl(team.name)+'</span> '+sn(team.name)+'</td><td class="num-c">'+team.gd+'</td><td class="pts-c">'+team.pts+'</td></tr>';
    });
    html += '</table>';
    g.matches.forEach(function(m) {
      var sc = m.s1 !== null ? m.s1+'-'+m.s2 : '-';
      html += '<div class="mrow"><div class="md">'+m.d+'</div><div class="mt1">'+sn(m.t1)+'</div><div class="mscore">'+sc+'</div><div class="mt2">'+sn(m.t2)+'</div></div>';
    });
    html += '</div>';
    if(idx < 3) topG.innerHTML += html; else botG.innerHTML += html;
  });

  propagateBracket();

  var koSection = document.getElementById('ko');
  koSection.innerHTML = '';

  ['r16', 'qf', 'sf'].forEach(function(roundKey) {
    var label = roundKey === 'r16' ? 'Round of 16' : (roundKey === 'qf' ? 'Quarter-Finals' : 'Semi-Finals');
    var roundHtml = '<div class="round-label">'+label+'</div><div class="ko-scroll"><div class="ko-row">';
    KO[roundKey].forEach(function(m) {
      var s1 = m.s1 !== null ? m.s1 : '-';
      var s2 = m.s2 !== null ? m.s2 : '-';
      roundHtml += '<div class="mc">' +
        '<div class="tr"><span>'+fl(m.t1)+' '+sn(m.t1 || 'TBD')+'</span><span class="sc">'+s1+'</span></div>' +
        '<div class="tr"><span>'+fl(m.t2)+' '+sn(m.t2 || 'TBD')+'</span><span class="sc">'+s2+'</span></div>' +
        '<div class="bi">'+m.info+'</div></div>';
    });
    roundHtml += '</div></div>';
    koSection.innerHTML += roundHtml;
  });

  var finS1 = KO.final.s1 !== null ? KO.final.s1 : '-';
  var finS2 = KO.final.s2 !== null ? KO.final.s2 : '-';
  koSection.innerHTML += '<div class="round-label">Final</div><div class="finals-row"><div class="mc-final">' +
    '<div class="fh">EURO 2028 FINAL</div>' +
    '<div class="tr"><span>'+fl(KO.final.t1)+' '+sn(KO.final.t1 || 'TBD')+'</span><span class="sc">'+finS1+'</span></div>' +
    '<div class="tr"><span>'+fl(KO.final.t2)+' '+sn(KO.final.t2 || 'TBD')+'</span><span class="sc">'+finS2+'</span></div>' +
    '<div class="bi">'+KO.final.info+'</div></div></div>';
}

function openModal() {
  var body = document.getElementById('modal-body');
  body.innerHTML = '';
  GROUPS.forEach(function(g, gIdx) {
    g.matches.forEach(function(m, mIdx) {
      var v1 = m.s1 !== null ? m.s1 : '';
      var v2 = m.s2 !== null ? m.s2 : '';
      body.innerHTML += '<div class="modal-match">' +
        '<div class="tm r">'+m.t1+'</div>' +
        '<input type="number" class="sinp" id="m-'+gIdx+'-'+mIdx+'-1" value="'+v1+'">' +
        '<div class="sdash">-</div>' +
        '<input type="number" class="sinp" id="m-'+gIdx+'-'+mIdx+'-2" value="'+v2+'">' +
        '<div class="tm">'+m.t2+'</div></div>';
    });
  });
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveScores() {
  GROUPS.forEach(function(g, gIdx) {
    g.matches.forEach(function(m, mIdx) {
      var s1 = document.getElementById('m-'+gIdx+'-'+mIdx+'-1').value;
      var s2 = document.getElementById('m-'+gIdx+'-'+mIdx+'-2').value;
      m.s1 = s1 !== '' ? parseInt(s1) : null;
      m.s2 = s2 !== '' ? parseInt(s2) : null;
    });
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(GROUPS)); } catch(e){}
  closeModal();
  renderAll();
}

function fetchLiveScores() {
  var btn = document.getElementById('auto-btn');
  btn.innerText = '⌛...';
  fetch(WORKER_URL)
    .then(function(res){ return res.json(); })
    .then(function(data){
      // Mapping API responses directly over matches structurally
      renderAll();
      btn.innerText = '⚡ Auto';
    })
    .catch(function(){
      btn.innerText = '❌ Error';
      setTimeout(function(){ btn.innerText = '⚡ Auto'; }, 2000);
    });
}

// Initialization lifecycle
try {
  var stored = localStorage.getItem(STORAGE_KEY);
  if(stored) {
    var parsed = JSON.parse(stored);
    GROUPS.forEach(function(g, i){ if(parsed[i]) g.matches = parsed[i].matches; });
  }
} catch(e){}
renderAll();
</script>
</body>
</html>
